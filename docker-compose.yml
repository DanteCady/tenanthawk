services:
  db:
    image: postgres:17-alpine
    container_name: tenanthawk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenanthawk
    ports:
      - "5432:5432"
    volumes:
      - tenanthawk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenanthawk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tenanthawk_pgdata:
